<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="moonGlow" cx="0.3" cy="0.3">
      <stop offset="0%" stop-color="#f4e4c1" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#d4af37" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="60%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16213e"/>
      <stop offset="50%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  
  <!-- Sky base -->
  <rect width="400" height="250" fill="url(#skyGrad)"/>
  
  <!-- Water -->
  <rect y="250" width="400" height="150" fill="url(#waterGrad)"/>
  
  <!-- Moon - primary light source -->
  <circle cx="120" cy="80" r="35" fill="#f4e4c1"/>
  <circle cx="120" cy="80" r="60" fill="url(#moonGlow)"/>
  
  <!-- Mountain silhouettes - darkest values -->
  <polygon points="0,250 80,180 160,220 280,160 400,200 400,250" fill="#000"/>
  <polygon points="0,250 120,200 200,240 400,190 400,250" fill="#0a0a1a" opacity="0.8"/>
  
  <!-- Moon reflection on water -->
  <ellipse cx="120" cy="320" rx="15" ry="40" fill="#d4af37" opacity="0.6"/>
  <ellipse cx="120" cy="330" rx="8" ry="25" fill="#f4e4c1" opacity="0.4"/>
  
  <!-- Subtle water ripples -->
  <ellipse cx="120" cy="310" rx="40" ry="3" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <ellipse cx="120" cy="340" rx="60" ry="2" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.2"/>
  
  <!-- Foreground elements - establishing depth -->
  <ellipse cx="350" cy="240" rx="30" ry="15" fill="#000" opacity="0.8"/>
  <ellipse cx="50" cy="235" rx="25" ry="12" fill="#000" opacity="0.6"/>
</svg>