<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1a0d2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0412;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="aurora1" cx="50%" cy="20%" r="80%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8" />
      <stop offset="40%" style="stop-color:#00ccff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#8855ff;stop-opacity:0.1" />
    </radialGradient>
    <radialGradient id="aurora2" cx="30%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ff4488;stop-opacity:0.6" />
      <stop offset="60%" style="stop-color:#ff8800;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff4488;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="30%" style="stop-color:#88ddff;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#4488ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2244aa;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)" />
  
  <!-- Aurora layers -->
  <ellipse cx="200" cy="80" rx="180" ry="40" fill="url(#aurora1)" opacity="0.7" transform="rotate(-15 200 80)" />
  <ellipse cx="120" cy="160" rx="140" ry="30" fill="url(#aurora2)" opacity="0.6" transform="rotate(25 120 160)" />
  <ellipse cx="280" cy="240" rx="120" ry="25" fill="url(#aurora1)" opacity="0.5" transform="rotate(-35 280 240)" />
  
  <!-- Central artistic brush stroke -->
  <path d="M 140 180 Q 200 120 260 200 Q 220 260 180 220 Q 160 200 140 180" fill="url(#centerGlow)" opacity="0.8" />
  
  <!-- Sparkle details -->
  <circle cx="100" cy="100" r="2" fill="#ffffff" opacity="0.9" />
  <circle cx="320" cy="120" r="1.5" fill="#00ff88" opacity="0.8" />
  <circle cx="80" cy="280" r="1" fill="#ff4488" opacity="0.7" />
  <circle cx="300" cy="300" r="2.5" fill="#88ddff" opacity="0.6" />
  <circle cx="150" cy="80" r="1" fill="#ffffff" opacity="0.8" />
  <circle cx="350" cy="180" r="1.5" fill="#00ccff" opacity="0.7" />
  
  <!-- Artistic 'A' integrated into the design -->
  <path d="M 180 240 L 200 180 L 220 240 M 190 220 L 210 220" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.9" stroke-linecap="round" />
</svg>